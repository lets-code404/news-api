
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Explore</title>
</head>

<body>

    <h1>Tech News</h1>

    <p>
        <button class="topic" data-topic="AI">AI</button>
        <button class="topic" data-topic="java">Java</button>
        <button class="topic" data-topic="blockchain">Blockchain</button>
        <button class="topic" data-topic="cybersecurity">Cybersecurity</button>
        <button class="topic" data-topic="startup">Startup</button>
        <button class="topic" data-topic="gadgets">Gadgets</button>
    </p>

    <hr>

    <div id="news"></div>

    <script>

        const newsContainer = document.getElementById('news');

        // FETCH NEWS
        async function fetchNews(topic) {

            newsContainer.innerHTML = "Loading...";

            try {

                const url = `https://hn.algolia.com/api/v1/search?query=${topic}`;

                const res = await fetch(url);

                const data = await res.json();

                showNews(data.hits);

            } catch (err) {

                newsContainer.innerHTML = "Error loading news";
                console.error(err);

            }
        }

        // DISPLAY NEWS
        function showNews(articles) {

            newsContainer.innerHTML = "";

            articles.forEach(article => {

                const title = article.title || article.story_title || "No Title";

                const url = article.url || article.story_url;

                if (!url) return;

                const div = document.createElement("div");

                div.innerHTML = `
                    <h3>${title}</h3>
                    <a href="${url}" target="_blank">Read</a>
                    <hr>
                `;

                newsContainer.appendChild(div);

            });
        }

        // TOPIC BUTTONS
        const topics = document.querySelectorAll(".topic");

        topics.forEach(btn => {

            btn.addEventListener("click", () => {

                fetchNews(btn.dataset.topic);

            });

        });

        // DEFAULT NEWS
        fetchNews("technology");

    </script>

</body>

</html>
